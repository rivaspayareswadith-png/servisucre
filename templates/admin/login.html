<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — ServiSucre</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">
</head>
<body>
<main style="display:flex; align-items:center; justify-content:center; min-height:100vh">
    <div class="form-card" style="width:100%; max-width:400px; text-align:center">
        <div style="font-size:2.5rem; margin-bottom:12px">🛡️</div>
        <h3 style="font-size:1.4rem; margin-bottom:6px">Panel Administrador</h3>
        <p style="color:var(--gris); margin-bottom:24px; font-size:0.9rem">ServiSucre</p>

        {% if error %}
            <div class="alert-error">⚠️ {{ error }}</div>
        {% endif %}

        <form action="/admin/login" method="POST" class="form-modern">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="usuario" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary full">Entrar →</button>
        </form>
    </div>
</main>
</body>
</html>
